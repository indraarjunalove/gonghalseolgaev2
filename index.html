<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>A²-BMS Dashboard</title>

    <!-- Chart.js (버전 고정으로 CDN latest 깨짐 방지) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* ===== 전체 레이아웃 (라이트 테마) ===== */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #ffffff; color: #1a1a1a; text-align: center; margin: 0; padding: 10px; }
        h2 { margin-bottom: 5px; }

        /* ===== 상단 제어 패널 ===== */
        .control-panel { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 12px; flex-wrap: wrap; }
        #status { font-size: 14px; font-weight: bold; }
        #toggleBtn { background-color: #ffaa00; color: #000; border: none; padding: 10px 18px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        #toggleBtn:hover { background-color: #ffcc00; transform: scale(1.05); }

        /* AI 판단 결과 박스 */
        #aiStatus { background-color: #f0f0f0; border: 2px solid #b0b0b0; padding: 10px 18px; font-size: 14px; font-weight: bold; border-radius: 5px; min-width: 200px; transition: all 0.3s ease; text-align: left; }
        #aiStatus .ai-mode { font-size: 18px; }
        #aiStatus .ai-meta { font-size: 12px; color: #555; margin-top: 4px; font-weight: normal; }

        /* 셀별 AI 출력값 */
        #cellOutputs { background-color: #f0f0f0; border: 1px solid #b0b0b0; padding: 8px 14px; border-radius: 5px; display: flex; gap: 12px; font-size: 12px; align-items: center; }
        .cell-out-label { font-weight: bold; color: #00a080; padding-right: 4px; }
        .cell-out { padding: 4px 8px; border-left: 3px solid #b0b0b0; }
        .cell-out .cell-label { color: #666; font-size: 10px; }
        .cell-out .cell-val { font-weight: bold; font-size: 14px; }
        .cell-out.c1 { border-color: #d63b5e; }
        .cell-out.c2 { border-color: #2680c2; }
        .cell-out.c3 { border-color: #a040d8; }
        .cell-out.c4 { border-color: #c8a020; }

        /* ===== 그래프 대시보드 (4열) ===== */
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 98%; max-width: 1900px; margin: 0 auto; }
        .chart-container { background-color: #f0f0f0; border-radius: 8px; padding: 10px; height: 280px; display: flex; flex-direction: column; border: 1px solid #d0d0d0; }
        .chart-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; border-bottom: 1px solid #c0c0c0; padding-bottom: 6px; }
        .chart-title-box { text-align: left; }
        .chart-title { font-size: 14px; font-weight: bold; white-space: nowrap; }
        .chart-desc { font-size: 11px; color: #555; display: block; margin-top: 2px; }
        .live-values { display: flex; gap: 8px; font-size: 12px; background: #fff; padding: 4px 8px; border-radius: 4px; border: 1px solid #c0c0c0; font-family: monospace; }
        .val-c1 { color: #d63b5e; font-weight: bold; }
        .val-c2 { color: #2680c2; font-weight: bold; }
        .val-c3 { color: #a040d8; font-weight: bold; }
        .val-c4 { color: #c8a020; font-weight: bold; }
        .canvas-wrapper { flex-grow: 1; position: relative; }
        canvas { width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; }

        /* STOP 모드 경고 깜빡임 */
        @keyframes pulse-danger { 0%, 100% { background-color: #ffd6d6; } 50% { background-color: #ffb0b0; } }
        #aiStatus.mode-stop { animation: pulse-danger 1s infinite; border-color: #d62020 !important; color: #a01010 !important; }

        /* 그래프 상단 색 띠: 전기값(파랑) / PWM모스펫(초록) / DAC모스펫(주황) */
        .row-elec { border-top: 3px solid #2680c2; }
        .row-pwm  { border-top: 3px solid #00a080; }
        .row-dac  { border-top: 3px solid #e65100; }
    </style>
</head>
<body>

    <h2>A²-BMS 실시간 대시보드</h2>

    <!-- ===== 상단 제어 패널 ===== -->
    <div class="control-panel">
        <div id="status">연결 대기 중...</div>
        <button id="toggleBtn" onclick="toggleDataMode()">실제 / 시뮬 토글</button>
        <div id="aiStatus">
            <div class="ai-mode" id="ai_mode_text">AI 모드: --</div>
            <div class="ai-meta" id="ai_p_dac">P_DAC: --</div>
        </div>
        <div id="cellOutputs">
            <div class="cell-out-label">출력</div>
            <div class="cell-out c1"><div class="cell-label">C1</div><div class="cell-val" id="cell1_out">--</div></div>
            <div class="cell-out c2"><div class="cell-label">C2</div><div class="cell-val" id="cell2_out">--</div></div>
            <div class="cell-out c3"><div class="cell-label">C3</div><div class="cell-val" id="cell3_out">--</div></div>
            <div class="cell-out c4"><div class="cell-label">C4</div><div class="cell-val" id="cell4_out">--</div></div>
        </div>
    </div>

    <!-- ===== 그래프 4개 ===== -->
    <div class="dashboard">
        <!-- 전압 -->
        <div class="chart-container row-elec">
            <div class="chart-header">
                <div class="chart-title-box">
                    <div class="chart-title">셀 전압</div>
                    <span class="chart-desc">밸런싱 진행에 따른 셀별 전압</span>
                </div>
                <div class="live-values" id="val_v">
                    <span class="val-c1">--</span> <span class="val-c2">--</span> <span class="val-c3">--</span> <span class="val-c4">--</span>
                </div>
            </div>
            <div class="canvas-wrapper"><canvas id="chart_v"></canvas></div>
        </div>

        <!-- 전류 (계산값) -->
        <div class="chart-container row-elec">
            <div class="chart-header">
                <div class="chart-title-box">
                    <div class="chart-title">셀 전류</div>
                    <span class="chart-desc">PWM=펄스 / DAC=선형 (모드값에서 계산)</span>
                </div>
                <div class="live-values" id="val_i">
                    <span class="val-c1">--</span> <span class="val-c2">--</span> <span class="val-c3">--</span> <span class="val-c4">--</span>
                </div>
            </div>
            <div class="canvas-wrapper"><canvas id="chart_i"></canvas></div>
        </div>

        <!-- PWM 모스펫 온도 -->
        <div class="chart-container row-pwm">
            <div class="chart-header">
                <div class="chart-title-box">
                    <div class="chart-title">PWM 모스펫 온도</div>
                    <span class="chart-desc">Q_PWM 스위칭 손실 (I²R, 발열 작음)</span>
                </div>
                <div class="live-values" id="val_pwm_t">
                    <span class="val-c1">--</span> <span class="val-c2">--</span> <span class="val-c3">--</span> <span class="val-c4">--</span>
                </div>
            </div>
            <div class="canvas-wrapper"><canvas id="chart_pwm_t"></canvas></div>
        </div>

        <!-- DAC 모스펫 온도 -->
        <div class="chart-container row-dac">
            <div class="chart-header">
                <div class="chart-title-box">
                    <div class="chart-title">DAC 모스펫 온도</div>
                    <span class="chart-desc">Q_LINEAR 선형 손실 (V_DS×I, 발열 큼)</span>
                </div>
                <div class="live-values" id="val_dac_t">
                    <span class="val-c1">--</span> <span class="val-c2">--</span> <span class="val-c3">--</span> <span class="val-c4">--</span>
                </div>
            </div>
            <div class="canvas-wrapper"><canvas id="chart_dac_t"></canvas></div>
        </div>
    </div>

    <script>
        // ============================================================
        // 전역 설정
        // ============================================================
        const MAX_DATA_POINTS = 18;   // 그래프에 보관할 데이터 포인트 (18초치)
        const CELL_COLORS = ['#d63b5e', '#2680c2', '#a040d8', '#c8a020'];  // 셀별 색

        // ============================================================
        // 차트 생성
        //   canvasId  : <canvas> id
        //   yMin,yMax : Y축 범위
        //   dangerLine: 위험 임계 온도 (빨간 점선), null이면 없음
        // ============================================================
        function createChart(canvasId, yMin, yMax, dangerLine=null) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const datasets = [];
            // 셀 4개 라인
            for (let i = 0; i < 4; i++) {
                datasets.push({
                    label: `Cell${i+1}`,
                    borderColor: CELL_COLORS[i],
                    backgroundColor: CELL_COLORS[i],
                    data: [],
                    borderWidth: 2,
                    pointRadius: 0,        // 점(원) 숨김
                    pointHoverRadius: 0,   // hover 시에도 점 안 생김
                    fill: false,
                    tension: 0.2
                });
            }
            // 위험 임계선 (온도 그래프만)
            if (dangerLine !== null) {
                datasets.push({
                    label: `위험 (${dangerLine}°C)`,
                    borderColor: '#d62020',
                    borderDash: [5, 5],
                    borderWidth: 1,
                    data: [],
                    pointRadius: 0,
                    pointHoverRadius: 0,
                    fill: false,
                    tension: 0
                });
            }
            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        y: { min: yMin, max: yMax, grid: { color: '#d0d0d0' }, ticks: { color: '#555', font: { size: 9 } } },
                        x: { grid: { color: '#d0d0d0' }, ticks: { display: false } }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    elements: { point: { radius: 0, hoverRadius: 0 } }  // 점 전역 비활성화
                }
            });
        }

        // ============================================================
        // 차트 4개 생성
        // ============================================================
        const charts = {
            v:      createChart('chart_v', 3.3, 4.3),          // 전압 3.3~4.3V
            i:      createChart('chart_i', -0.05, 0.6),        // 전류 0~0.5A
            pwm_t:  createChart('chart_pwm_t', 25, 75, 65),    // PWM 모스펫, 위험선 65°C
            dac_t:  createChart('chart_dac_t', 25, 75, 65)     // DAC 모스펫, 위험선 65°C
        };

        // ============================================================
        // AI 판단 박스 갱신
        // ============================================================
        function updateAIBoard(mode, p_dac) {
            const board = document.getElementById('aiStatus');
            document.getElementById('ai_mode_text').innerText = `AI 모드: ${mode}`;
            document.getElementById('ai_p_dac').innerText = `P_DAC: ${(p_dac * 100).toFixed(0)}%`;
            board.classList.remove('mode-stop');
            if (mode === "STOP") {
                board.classList.add('mode-stop');
            } else {
                const isPWM = mode === "PWM";
                board.style.borderColor = isPWM ? "#00a080" : "#e65100";
                board.style.color = isPWM ? "#00a080" : "#e65100";
            }
        }

        // ============================================================
        // 셀별 출력값 갱신 (DAC값 또는 PWM 듀티)
        // ============================================================
        function updateCellOutputs(data) {
            const mode = data.ai_mode;
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`cell${i+1}_out`);
                if (!el) continue;
                if (mode === "DAC") el.innerText = `DAC: ${data.real.dac_vals[i]}`;
                else if (mode === "PWM") el.innerText = `Duty: ${data.real.pwm_duty[i]}`;
                else el.innerText = "STOP";
            }
        }

        // ============================================================
        // 실시간 수치 갱신 (그래프 우측 상단)
        // ============================================================
        function updateLiveValues(id, vals, decimals, unit) {
            const el = document.getElementById(id);
            if (!el || !vals) return;
            const spans = el.querySelectorAll('span');
            for (let i = 0; i < 4; i++) {
                if (spans[i] && vals[i] !== undefined) {
                    spans[i].innerText = vals[i].toFixed(decimals) + unit;
                }
            }
        }

        // ============================================================
        // 메인 갱신 함수
        // ============================================================
        function updateDashboardWithData(data) {
            try {
                const now = new Date().toLocaleTimeString('ko-KR', { hour12: false });

                updateAIBoard(data.ai_mode, data.p_dac);
                if (!data.real.dac_vals) data.real.dac_vals = [0, 0, 0, 0];
                if (!data.real.pwm_duty) data.real.pwm_duty = [0, 0, 0, 0];
                updateCellOutputs(data);

                // 실시간 수치
                updateLiveValues('val_v', data.real.v, 3, 'V');
                updateLiveValues('val_i', data.real.i, 2, 'A');
                updateLiveValues('val_pwm_t', data.real.pwm_mosfet_t, 1, '°C');
                updateLiveValues('val_dac_t', data.real.dac_mosfet_t, 1, '°C');

                // 차트에 데이터 추가하는 내부 함수
                function update(chart, vals, dangerVal=null) {
                    if (!chart || !vals) return;
                    chart.data.labels.push(now);
                    vals.forEach((v, i) => {
                        if (chart.data.datasets[i]) chart.data.datasets[i].data.push(v);
                    });
                    if (dangerVal !== null) {
                        const lastIdx = chart.data.datasets.length - 1;
                        chart.data.datasets[lastIdx].data.push(dangerVal);
                    }
                    if (chart.data.labels.length > MAX_DATA_POINTS) {
                        chart.data.labels.shift();
                        chart.data.datasets.forEach(d => d.data.shift());
                    }
                    chart.update('none');
                }

                // 4개 그래프 갱신
                update(charts.v, data.real.v);
                update(charts.i, data.real.i);
                update(charts.pwm_t, data.real.pwm_mosfet_t, 65);   // 위험선 65°C
                update(charts.dac_t, data.real.dac_mosfet_t, 65);   // 위험선 65°C
            } catch (error) {
                console.error("[렌더링 에러]:", error);
            }
        }

        // ============================================================
        // WebSocket 연결 (https→wss, http→ws 자동)
        // ============================================================
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const ws = new WebSocket(protocol + window.location.host + "/ws");

        ws.onopen = () => {
            document.getElementById('status').innerText = "시스템 정상";
            document.getElementById('status').style.color = "#00a080";
        };
        ws.onclose = () => {
            document.getElementById('status').innerText = "연결 끊김";
            document.getElementById('status').style.color = "#d62020";
        };
        ws.onerror = (e) => { console.error("[WS 에러]:", e); };
        ws.onmessage = function(event) {
            try {
                updateDashboardWithData(JSON.parse(event.data));
            } catch (e) {
                console.error("[파싱 에러]:", e);
            }
        };

        // 실제/시뮬 모드 토글
        function toggleDataMode() {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ command: "toggle_mode" }));
            }
        }
    </script>
</body>
</html>
